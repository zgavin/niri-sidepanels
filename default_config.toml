# niri-sidepanels configuration
#
# The tool supports two independent panels: a left panel and a right panel.
# Each one has its own width, margins, peek behavior, and window rules.
# Disable either by setting `enabled = false` in its section.

[left]
enabled = false
# Panel width in pixels.
width = 400
# Deprecated: ignored since windows in a panel now split the available vertical
# space equally. Kept in the schema for forward compatibility.
height = 335
# Gap between stacked windows, in pixels.
gap = 10
# How much of the panel peeks in from the edge when hidden, in pixels.
peek = 10
# How much of the panel is visible when a panel window is focused. Defaults to `peek`.
# Set equal to `width + margins.left` to make focused windows fully unhide.
focus_peek = 50
# Whether the panel follows you when you switch workspaces.
sticky = false

[left.margins]
top = 50
right = 10
left = 10
bottom = 10

[right]
enabled = true
width = 400
height = 335
gap = 10
peek = 10
focus_peek = 50
sticky = false

[right.margins]
top = 50
right = 10
left = 10
bottom = 10

# Window rules. Rules are global; match an `app_id` and/or `title` regex and
# override any of width/height/peek/focus_peek. If `auto_add = true`, matching
# windows are added to the panel indicated by `side` (or the right panel if
# `side` is omitted and the right panel is enabled).
#
# [[window_rule]]
# app_id = "firefox"
# title = "^Picture-in-Picture$"
# width = 700
# height = 400
# focus_peek = 710
# peek = 10
# auto_add = true
# side = "right"
